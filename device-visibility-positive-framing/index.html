<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
  <title>Post gallery DRAFT</title>
  <script type="module" src="https://js.arcgis.com/5.0/"></script>
  <link rel="stylesheet" href="https://webapps-cdn.esri.com/CDN/fonts/v1.4.1/fonts.css" />
  <script type="module" src="https://cdn.jsdelivr.net/npm/@esri/hub-components@latest/dist/hub-components/hub-components.esm.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@esri/hub-components@latest/dist/hub-components/hub-components.css" />
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <div class="app-shell">
    <main class="workspace">
      <section class="preview-panel panel">
        <div class="preview-stage">
          <div class="preview-frame" id="preview-frame">
            <div class="preview-shell" id="preview-shell"></div>
          </div>
        </div>
      </section>

      <aside class="reply-thread-drawer panel" id="reply-thread-drawer" hidden aria-labelledby="reply-thread-drawer-title">
        <div class="drawer-header">
          <h2 id="reply-thread-drawer-title">All replies</h2>
          <calcite-action id="close-reply-thread-button" icon="x" text="Close"></calcite-action>
        </div>
        <div class="reply-thread-drawer-content" id="reply-thread-drawer-content"></div>
      </aside>
    </main>
  </div>

  <template id="search-template">
    <div class="example-shell">
      <div class="content-stage">
        <div class="map-backdrop" aria-hidden="true">
          <arcgis-map class="map-canvas" item-id="05e015c5f0314db9a487a9b46cb37eca" zoom="11"></arcgis-map>
          <div class="map-chrome">
            <span class="map-pill">Live map area</span>
            <span class="map-pill map-pill-secondary">Content behind</span>
          </div>
        </div>
        <div class="shell-layout">
          <div class="shell-sidebar shell-sidebar-start"></div>
          <div class="shell-sidebar shell-sidebar-main"></div>
          <calcite-panel class="body-shell"></calcite-panel>
          <div class="shell-sidebar shell-sidebar-end"></div>
        </div>
      </div>
    </div>
  </template>

  <template id="map-template">
    <div class="example-shell map-example-shell">
      <div class="content-stage">
        <div class="map-backdrop" aria-hidden="true">
          <calcite-shell class="map-runtime-shell" content-behind>
            <arcgis-map class="map-canvas map-runtime-canvas" id="disc-map" basemap="osm" center="-77.0369,38.9072" zoom="11"></arcgis-map>
            <calcite-shell-panel class="map-runtime-panel" slot="panel-start" position="start" display-mode="float-content">
              <calcite-panel class="body-shell map-body-shell"></calcite-panel>
            </calcite-shell-panel>
          </calcite-shell>
        </div>
      </div>
    </div>
  </template>

  <script type="module" src="./app.js"></script>
</body>

</html>
